<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Idea Validation</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f8fbff;
    }

    nav {
      background: #1e3a8a;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    nav h1 {
      margin: 0;
      font-size: 20px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 18px;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    nav .profile {
      background: #2563eb;
      padding: 6px 10px;
      border-radius: 50%;
      font-weight: bold;
    }

    .stage {
      min-height: calc(100vh - 80px);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .cta {
      appearance: none;
      border: none;
      padding: 18px 36px;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, #2563eb, #1e3a8a);
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(30,58,138,.25);
      transition: transform .15s ease, box-shadow .25s ease, filter .25s ease;
    }

    .cta:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 38px rgba(30,58,138,.33);
      filter: brightness(1.05);
    }
  </style>
</head>
<body>
  <nav>
    <h1>StartupForge</h1>
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="idea.html">Idea Validation</a></li>
      <li><a href="pitchdeck.html">Pitch Deck</a></li>
      <li><a href="matchmaker.html">Matchmaker</a></li>
      <li><a href="investors.html">Investors</a></li>
      <li><a href="captable.html">Cap Table</a></li>
      <li><a href="experts.html">Experts</a></li>
    </ul>
    <div class="profile">AC</div>
  </nav>

  <div class="stage">
  <a href="http://172.16.44.98:8502/" class="cta">
    Get your ideas pitched in 20 seconds
  </a>
</div>

</body>
</html>
